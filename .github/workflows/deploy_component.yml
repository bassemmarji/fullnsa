name: Deploy Component With Dependencies

# ─────────────────────────────────────────────────────────────────────────────
# Concurrency guard — prevents two runs targeting the same
# destination org from executing simultaneously. cancel-in-progress: false
# means the second run waits rather than being killed.
# ─────────────────────────────────────────────────────────────────────────────
concurrency:
  group: deploy-${{ github.event.inputs.DST_ORG_ALIAS }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      SRC_ORG_ALIAS:
        description: "Alias for the Source Salesforce org"
        required: true
        default: "SrcOrgAlias"
      DST_ORG_ALIAS:
        description: "Alias for the Destination Salesforce org"
        required: true
        default: "DstOrgAlias"
      COMPONENT_TYPE:
        description: "Metadata type (e.g., ApexClass, ApexTrigger, LightningComponentBundle)"
        required: true
        default: "ApexClass"
      COMPONENT_NAME:
        description: "API name of the component"
        required: true
      DRY_RUN:
        description: "Set to true to only list dependencies without retrieval or deployment"
        required: false
        default: "false"
      VALIDATE_ONLY:
        description: "Set to true for validation-only deployment (no changes applied)"
        required: false
        default: "false"
      RUN_TESTS:
        description: "Set to true to run Apex tests before deploying"
        required: false
        default: "false"
      TEST_CLASS_NAMES:
        description: "Comma-separated Apex test class names (required when RUN_TESTS=true)"
        required: false
        default: ""
      # ───────────────────────────────────────────────────────────────────────
      # Test classes to deploy (not discovered via dependency graph)
      # ───────────────────────────────────────────────────────────────────────
      TEST_CLASS_NAMES_DEPLOY:
        description: "Comma-separated test class names to deploy (e.g., AccountRatingHandlerTest)"
        required: false
        default: ""

env:
  SRC_ORG_ALIAS:          ${{ github.event.inputs.SRC_ORG_ALIAS }}
  DST_ORG_ALIAS:          ${{ github.event.inputs.DST_ORG_ALIAS }}
  COMPONENT_TYPE:         ${{ github.event.inputs.COMPONENT_TYPE }}
  COMPONENT_NAME:         ${{ github.event.inputs.COMPONENT_NAME }}
  DRY_RUN:                ${{ github.event.inputs.DRY_RUN }}
  VALIDATE_ONLY:          ${{ github.event.inputs.VALIDATE_ONLY }}
  RUN_TESTS:              ${{ github.event.inputs.RUN_TESTS }}
  TEST_CLASS_NAMES:       ${{ github.event.inputs.TEST_CLASS_NAMES }}
  # ─────────────────────────────────────────────────────────────────────────
  # FIX: TEST_CLASS_NAMES_DEPLOY moved to global env so it is available
  #      to every step, not just the one step that previously declared it
  #      as a step-level env override.
  # ─────────────────────────────────────────────────────────────────────────
  TEST_CLASS_NAMES_DEPLOY: ${{ github.event.inputs.TEST_CLASS_NAMES_DEPLOY }}
  PROJECT_DIR:            ./deployment-project

jobs:
  deploy_with_dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v6

      - name: 'Install Node.js'
        uses: actions/setup-node@v6
        with:
          node-version: 20

      # ───────────────────────────────────────────────────────────────────────
      # Cache the global npm install
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Cache Salesforce CLI'
        id: cache-sf-cli
        uses: actions/cache@v5
        with:
          path: ~/.npm-global
          key: sf-cli-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            sf-cli-${{ runner.os }}-

      - name: 'Install Salesforce CLI'
        if: steps.cache-sf-cli.outputs.cache-hit != 'true'
        run: |
          npm config set prefix '~/.npm-global'
          npm install @salesforce/cli --global

      - name: 'Add npm global bin to PATH'
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: 'Verify Salesforce CLI'
        run: |
          sf --version
          sf plugins --core

      - name: 'Authenticate Source & Destination Orgs'
        run: |
          echo "${{ secrets.SRC_ORG_SFDX_URL }}" | sf org login sfdx-url \
            --alias $SRC_ORG_ALIAS --sfdx-url-stdin
          echo "${{ secrets.DST_ORG_SFDX_URL }}" | sf org login sfdx-url \
            --alias $DST_ORG_ALIAS --sfdx-url-stdin
          sf org list

      - name: 'Create Salesforce Project'
        run: |
          sf project generate --name "deployment-project" --manifest
          echo "Project created."

      # ───────────────────────────────────────────────────────────────────────
      # Collect Dependencies via Tooling API
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Collect Dependencies via Tooling API'
        run: |
          echo "🔍 Querying MetadataComponentDependency for '$COMPONENT_NAME'..."
          # Query with relaxed filters (avoid name filter in WHERE clause)
          sf data query \
            --target-org "$SRC_ORG_ALIAS" \
            --query "SELECT MetadataComponentId, MetadataComponentName, MetadataComponentType, RefMetadataComponentName, RefMetadataComponentType FROM MetadataComponentDependency WHERE MetadataComponentType = '$COMPONENT_TYPE'" \
            --use-tooling-api \
            --json > "$PROJECT_DIR/dependencies_raw.json" 2>&1 || true

          # Filter using jq (backticks are literal in single quotes, no escape needed)
          jq --arg name "$COMPONENT_NAME" \
            '{result: {records: [.result.records[]? | select(.MetadataComponentName == $name)], totalSize: ([.result.records[]? | select(.MetadataComponentName == $name)] | length)}}' \
            "$PROJECT_DIR/dependencies_raw.json" > "$PROJECT_DIR/dependencies.json"

          RECORD_COUNT=$(jq '.result.totalSize // 0' "$PROJECT_DIR/dependencies.json")
          echo "Found $RECORD_COUNT dependencies for $COMPONENT_NAME"
          echo "## Dependencies for \`$COMPONENT_NAME\`" >> $GITHUB_STEP_SUMMARY
          if [ "$RECORD_COUNT" -gt "0" ]; then
            jq -r '.result.records[]? | "- `" + .RefMetadataComponentName + "` (" + .RefMetadataComponentType + ")"' \
              "$PROJECT_DIR/dependencies.json" >> $GITHUB_STEP_SUMMARY
          else
            echo "No dependencies found or query failed." >> $GITHUB_STEP_SUMMARY
          fi

      # ───────────────────────────────────────────────────────────────────────
      # Build package.xml from Dependencies (jq-only, no Python)
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Build package.xml from Dependencies'
        run: |
          cd "$PROJECT_DIR"
          echo "📦 Building package.xml for '$COMPONENT_NAME' and its dependencies..."

          # ─────────────────────────────────────────────────────────────────
          # FIX: TEST_CLASS_NAMES_DEPLOY is now available from the global env
          # block above, so the step-level env: override is no longer needed.
          #
          # FIX: ltrimstr(" ") added inside the split map so that class names
          # like "ClassA, ClassB" (note the space after the comma) are trimmed
          # to "ClassA" and "ClassB" instead of " ClassB", which would produce
          # an invalid member name in package.xml and cause a silent deploy
          # failure or a "Component not found" error in the destination org.
          # ─────────────────────────────────────────────────────────────────
          jq --arg comp_name "$COMPONENT_NAME" \
             --arg comp_type "$COMPONENT_TYPE" \
             --arg test_classes "$TEST_CLASS_NAMES_DEPLOY" '
            # Array of non-deployable metadata types
            def non_deployable: [
              "StandardEntity", "CustomEntity", "FieldSet", "RecordType",
              "WebLink", "ListView", "CompactLayout", "BusinessProcess", "HomePageLayout"
            ];

            # Helper: returns true if type is deployable
            def is_deployable: . as $t | (non_deployable | index($t)) == null;

            # Collect all components: main + dependencies + test classes
            (
              # 1. Main component
              [{type: $comp_type, name: $comp_name}]
              # 2. Dependencies from Tooling API query (safe iteration with ?)
              + [.result.records[]? | {type: .RefMetadataComponentType, name: .RefMetadataComponentName}
                 | select(.type != null and .name != null)]
              # 3. Test classes from workflow input — trim leading/trailing
              #    whitespace so "ClassA, ClassB" does not yield " ClassB"
              + (if $test_classes != "" then
                   ($test_classes | split(",") | map(
                     select(. != "") |
                     ltrimstr(" ") | rtrimstr(" ") |
                     {type: "ApexClass", name: .}
                   ))
                 else [] end)
            )
            # Filter: keep only deployable types with valid name/type
            | map(select(.type != null and .name != null and (.type | is_deployable)))
            # Group by type, collect unique sorted members
            | group_by(.type)
            | map({
                type: .[0].type,
                members: [.[].name] | unique | sort
              })
            | sort_by(.type)
          ' dependencies.json > /tmp/package_structure.json

          # Generate XML from jq output
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<Package xmlns="http://soap.sforce.com/2006/04/metadata">'

            # Only generate <types> blocks if we have data
            if [ -s /tmp/package_structure.json ] && jq -e 'length > 0' /tmp/package_structure.json > /dev/null 2>&1; then
              jq -r '.[] |
                "    <types>\n" +
                (.members | map("        <members>\(.)</members>") | join("\n")) + "\n" +
                "        <name>\(.type)</name>\n" +
                "    </types>"' /tmp/package_structure.json
            else
              echo "⚠️  No deployable components found — generating empty package.xml" >&2
            fi

            echo '    <version>59.0</version>'
            echo '</Package>'
          } > manifest/package.xml

          # Log output for verification
          echo "📦 Generated package.xml:"
          cat manifest/package.xml

          # Summary
          TYPE_COUNT=$(jq 'length' /tmp/package_structure.json 2>/dev/null || echo "0")
          MEMBER_COUNT=$(jq '[.[].members | length] | add // 0' /tmp/package_structure.json 2>/dev/null || echo "0")
          echo "📊 Summary: $TYPE_COUNT metadata types, $MEMBER_COUNT total members"

          # Echo which test classes were added to aid debugging
          if [ -n "$TEST_CLASS_NAMES_DEPLOY" ]; then
            echo "🧪 Test classes added to package.xml: $TEST_CLASS_NAMES_DEPLOY"
          fi

      # ───────────────────────────────────────────────────────────────────────
      # Dry-run check
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Dry Run Check'
        id: dry_run_check
        run: |
          if [ "$DRY_RUN" == "true" ]; then
            echo "skip_deploy=true" >> $GITHUB_OUTPUT
            echo "🧩 Dry Run mode — listing components that would be retrieved and deployed."
            echo "### Components to Deploy (dry run)" >> $GITHUB_STEP_SUMMARY

            jq -r '.result.records[]? | "- `" + .RefMetadataComponentName + "` (" + .RefMetadataComponentType + ")"' \
              "$PROJECT_DIR/dependencies.json" >> $GITHUB_STEP_SUMMARY \
              || echo "No dependencies found." >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⏹ Dry run complete — no metadata was retrieved or deployed." >> $GITHUB_STEP_SUMMARY
            echo "⏹ Dry run complete. No metadata was retrieved or deployed."
          else
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
            echo "Dry run not requested — proceeding with retrieval and deployment."
          fi

      # ───────────────────────────────────────────────────────────────────────
      # Retrieve Component and Dependencies
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Retrieve Component and Dependencies'
        if: steps.dry_run_check.outputs.skip_deploy != 'true'
        run: |
          cd "$PROJECT_DIR"
          echo "Retrieving metadata from '$SRC_ORG_ALIAS' using package.xml..."
          MAX_ATTEMPTS=3
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "--- Retrieve attempt $attempt of $MAX_ATTEMPTS ---"
            if sf project retrieve start \
                 --target-org "$SRC_ORG_ALIAS" \
                 --manifest manifest/package.xml; then
              echo "✅ Retrieve succeeded on attempt $attempt."
              break
            fi
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "⚠️  Retrieve failed. Waiting 15 s before retry..."
              sleep 15
            else
              echo "❌ Retrieve failed after $MAX_ATTEMPTS attempts."
              exit 1
            fi
          done
          echo "Files retrieved:"
          find force-app -type f | sort

      # ───────────────────────────────────────────────────────────────────────
      # Deploy to Destination Org
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Deploy to Destination Org'
        if: steps.dry_run_check.outputs.skip_deploy != 'true'
        run: |
          cd "$PROJECT_DIR"
          echo "🚀 Deploying to '$DST_ORG_ALIAS'..."

          # Build optional test flags
          TEST_FLAGS=""
          if [ "$RUN_TESTS" == "true" ]; then
            if [ -z "$TEST_CLASS_NAMES" ]; then
              echo "❌ Error: TEST_CLASS_NAMES is required when RUN_TESTS=true"
              exit 1
            fi
            # Convert comma-separated list to space-separated for --tests
            TEST_NAMES=$(echo "$TEST_CLASS_NAMES" | tr ',' ' ' | xargs)
            TEST_FLAGS="--test-level RunSpecifiedTests --tests $TEST_NAMES"
            echo "🧪 Apex test gate enabled. Running: $TEST_NAMES"
          fi

          # Choose deploy vs validate subcommand
          if [ "$VALIDATE_ONLY" == "true" ]; then
            DEPLOY_CMD="validate"
            echo "🔍 Validation-only mode — no changes will be applied."
          else
            DEPLOY_CMD="start"
            echo "✅ Full deployment mode — changes will be applied."
          fi

          MAX_ATTEMPTS=3
          DEPLOY_EXIT=0
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "--- Deploy attempt $attempt of $MAX_ATTEMPTS ---"
            # Capture exit code without masking errors
            set +e
            sf project deploy $DEPLOY_CMD \
              --target-org "$DST_ORG_ALIAS" \
              --source-dir force-app \
              $TEST_FLAGS \
              --json > deploy-result.json 2>&1
            DEPLOY_EXIT=$?
            set -e

            # Log raw output for debugging (truncated if too large)
            echo "📋 Deploy response (first 200 lines):"
            head -200 deploy-result.json

            if [ "$DEPLOY_EXIT" -eq 0 ]; then
              echo "✅ Deploy succeeded on attempt $attempt."
              break
            fi

            # Check if error is transient (network/timeout) — only retry those
            ERROR_MSG=$(jq -r '.message // ""' deploy-result.json 2>/dev/null || echo "Unknown error")
            if echo "$ERROR_MSG" | grep -qiE "timeout|ETIMEDOUT|socket|network|unavailable|connection"; then
              if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
                echo "⚠️  Transient error detected: $ERROR_MSG"
                echo "⏳ Waiting 15s before retry..."
                sleep 15
              else
                echo "❌ Deploy failed after $MAX_ATTEMPTS attempts (transient errors)."
              fi
            else
              echo "❌ Deploy failed with non-transient error — not retrying."
              echo "   Error: $ERROR_MSG"
              break
            fi
          done

          # Handle failure: log details and exit
          if [ "$DEPLOY_EXIT" -ne 0 ]; then
            echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Error | \`\`\`$ERROR_MSG\`\`\` |" >> $GITHUB_STEP_SUMMARY

            # Extract component failures if available
            FAILURES=$(jq -r '.result.details.componentFailures[]? |
                             "• `" + .componentType + "." + .fullName + "`: " + .problem' \
                      deploy-result.json 2>/dev/null || true)
            if [ -n "$FAILURES" ]; then
              echo "| Failures | <pre>$FAILURES</pre> |" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> 🔍 Check the 'Deploy to Destination Org' step logs for full details." >> $GITHUB_STEP_SUMMARY

            exit $DEPLOY_EXIT
          fi

          # Success: Generate clean, deduplicated results summary
          echo "## ✅ Deployment Results" >> $GITHUB_STEP_SUMMARY

          # Filter out package.xml and empty componentType entries
          SUCCESS_COUNT=$(jq '[.result.details.componentSuccesses[]? |
                             select(.componentType != "" and .componentType != null and .fullName != "package.xml")] | length' \
                          deploy-result.json 2>/dev/null || echo "0")

          if [ "$SUCCESS_COUNT" -gt "0" ]; then
            echo "### Deployed Components ($SUCCESS_COUNT)" >> $GITHUB_STEP_SUMMARY
            jq -r '.result.details.componentSuccesses[]? |
                   select(.componentType != "" and .componentType != null and .fullName != "package.xml") |
                   "- `" + .componentType + "`: `" + .fullName + "` ✅"' \
              deploy-result.json | sort -u >> $GITHUB_STEP_SUMMARY
          else
            echo "> ℹ️  No component success details available in response." >> $GITHUB_STEP_SUMMARY
          fi

          # Test results (if tests were run)
          if [ "$RUN_TESTS" == "true" ]; then
            echo "### Test Execution" >> $GITHUB_STEP_SUMMARY

            # Successes
            TEST_SUCCESSES=$(jq -r '.result.details.runTestResult.successes[]? |
                                   "- ✅ `" + .name + "." + .methodName + "`"' \
                            deploy-result.json 2>/dev/null || true)
            if [ -n "$TEST_SUCCESSES" ]; then
              echo "#### Passed" >> $GITHUB_STEP_SUMMARY
              echo "$TEST_SUCCESSES" >> $GITHUB_STEP_SUMMARY
            fi

            # Failures
            TEST_FAILURES=$(jq -r '.result.details.runTestResult.failures[]? |
                                  "- ❌ `" + .name + "." + .methodName + "`: " + .message' \
                           deploy-result.json 2>/dev/null || true)
            if [ -n "$TEST_FAILURES" ]; then
              echo "#### Failed" >> $GITHUB_STEP_SUMMARY
              echo "$TEST_FAILURES" >> $GITHUB_STEP_SUMMARY
            fi

            # Coverage summary
            COVERAGE=$(jq -r '.result.details.runTestResult.codeCoverage[]? |
                             "`" + .name + "`: " + (.numLinesCovered | tostring) + "/" + (.numLinesUncovered | tostring) + " covered"' \
                      deploy-result.json 2>/dev/null || true)
            if [ -n "$COVERAGE" ]; then
              echo "#### Coverage" >> $GITHUB_STEP_SUMMARY
              echo "$COVERAGE" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # Package.xml deployment confirmation
          echo "### Manifest" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ package.xml processed successfully" >> $GITHUB_STEP_SUMMARY

      # ───────────────────────────────────────────────────────────────────────
      # Generate Deployment Report
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Generate Deployment Report'
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Component | \`$COMPONENT_NAME\` (\`$COMPONENT_TYPE\`) |" >> $GITHUB_STEP_SUMMARY
          echo "| Source org | \`$SRC_ORG_ALIAS\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Destination org | \`$DST_ORG_ALIAS\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | $([ "$VALIDATE_ONLY" == "true" ] && echo "Validation only" || echo "Full deploy") |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry run | $DRY_RUN |" >> $GITHUB_STEP_SUMMARY
          echo "| Apex tests | $RUN_TESTS |" >> $GITHUB_STEP_SUMMARY

          # Only parse deploy-result.json when it actually exists
          if [ "$DRY_RUN" == "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⏹ Dry run — no deployment performed." >> $GITHUB_STEP_SUMMARY
          elif [ -f "$PROJECT_DIR/deploy-result.json" ]; then
            DEPLOY_STATUS=$(jq -r '.status // 1' "$PROJECT_DIR/deploy-result.json")
            if [ "$DEPLOY_STATUS" != "0" ]; then
              echo "### ❌ Deployment failed" >> $GITHUB_STEP_SUMMARY
              jq -r '.message // "Unknown error"' "$PROJECT_DIR/deploy-result.json" >> $GITHUB_STEP_SUMMARY
            else
              echo "### ✅ Successes" >> $GITHUB_STEP_SUMMARY
              jq -r '.result.details.componentSuccesses[]?
                     | select(.componentType != "" and .fullName != "package.xml") |
                     "- `" + .componentType + "`: `" + .fullName + "` ✅"' \
                "$PROJECT_DIR/deploy-result.json" >> $GITHUB_STEP_SUMMARY \
                || echo "No success details available." >> $GITHUB_STEP_SUMMARY

              echo "### Test results" >> $GITHUB_STEP_SUMMARY
              jq -r '.result.details.runTestResult.successes[]?
                     | "- `" + .name + "." + .methodName + "` ✅"' \
                "$PROJECT_DIR/deploy-result.json" >> $GITHUB_STEP_SUMMARY \
                || echo "No test results." >> $GITHUB_STEP_SUMMARY

              echo "### Failures (if any)" >> $GITHUB_STEP_SUMMARY
              jq -r '.result.details.componentFailures[]?
                     | "- `" + .componentType + "`: `" + .fullName + "` ❌ — " + .problem' \
                "$PROJECT_DIR/deploy-result.json" >> $GITHUB_STEP_SUMMARY \
                || echo "No component failures." >> $GITHUB_STEP_SUMMARY

              jq -r '.result.details.runTestResult.failures[]?
                     | "- `" + .name + "." + .methodName + "` ❌ — " + .message' \
                "$PROJECT_DIR/deploy-result.json" >> $GITHUB_STEP_SUMMARY \
                || echo "No test failures." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️  deploy-result.json not found — deployment step may have been skipped." \
              >> $GITHUB_STEP_SUMMARY
          fi

      # ───────────────────────────────────────────────────────────────────────
      # Upload Artifacts
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Upload Artifacts'
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deployment-artifacts
          path: |
            ${{ env.PROJECT_DIR }}/dependencies.json
            ${{ env.PROJECT_DIR }}/deploy-result.json
            ${{ env.PROJECT_DIR }}/manifest/package.xml
          if-no-files-found: warn
