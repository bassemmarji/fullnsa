name: Deploy Component With Dependencies

# ─────────────────────────────────────────────────────────────────────────────
# Concurrency guard — prevents two runs targeting the same
# destination org from executing simultaneously. cancel-in-progress: false
# means the second run waits rather than being killed.
# ─────────────────────────────────────────────────────────────────────────────
concurrency:
  group: deploy-${{ github.event.inputs.DST_ORG_ALIAS }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      SRC_ORG_ALIAS:
        description: "Alias for the Source Salesforce org"
        required: true
        default: "SrcOrgAlias"
      DST_ORG_ALIAS:
        description: "Alias for the Destination Salesforce org"
        required: true
        default: "DstOrgAlias"
      COMPONENT_TYPE:
        description: "Metadata type (e.g., ApexClass, ApexTrigger, LightningComponentBundle)"
        required: true
        default: "ApexClass"
      COMPONENT_NAME:
        description: "API name of the component"
        required: true
      DRY_RUN:
        description: "Set to true to only list dependencies without retrieval or deployment"
        required: false
        default: "false"
      VALIDATE_ONLY:
        description: "Set to true for validation-only deployment (no changes applied)"
        required: false
        default: "false"
      RUN_TESTS:
        description: "Set to true to run Apex tests before deploying"
        required: false
        default: "false"
      TEST_CLASS_NAMES_DEPLOY:
        description: "Comma-separated test class names to deploy. Leave empty to auto-discover."
        required: false
        default: ""

env:
  SRC_ORG_ALIAS:    ${{ github.event.inputs.SRC_ORG_ALIAS }}
  DST_ORG_ALIAS:    ${{ github.event.inputs.DST_ORG_ALIAS }}
  COMPONENT_TYPE:   ${{ github.event.inputs.COMPONENT_TYPE }}
  COMPONENT_NAME:   ${{ github.event.inputs.COMPONENT_NAME }}
  DRY_RUN:          ${{ github.event.inputs.DRY_RUN }}
  VALIDATE_ONLY:    ${{ github.event.inputs.VALIDATE_ONLY }}
  RUN_TESTS:        ${{ github.event.inputs.RUN_TESTS }}
  PROJECT_DIR:      ./deployment-project

jobs:
  deploy_with_dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Install Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ───────────────────────────────────────────────────────────────────────
      # Cache the global npm install
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Cache Salesforce CLI'
        id: cache-sf-cli
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: sf-cli-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            sf-cli-${{ runner.os }}-

      - name: 'Install Salesforce CLI'
        if: steps.cache-sf-cli.outputs.cache-hit != 'true'
        run: |
          npm config set prefix '~/.npm-global'
          npm install @salesforce/cli --global

      - name: 'Add npm global bin to PATH'
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: 'Verify Salesforce CLI'
        run: |
          sf --version
          sf plugins --core

      - name: 'Authenticate Source & Destination Orgs'
        run: |
          echo "${{ secrets.SRC_ORG_SFDX_URL }}" | sf org login sfdx-url \
            --alias $SRC_ORG_ALIAS --sfdx-url-stdin
          echo "${{ secrets.DST_ORG_SFDX_URL }}" | sf org login sfdx-url \
            --alias $DST_ORG_ALIAS --sfdx-url-stdin
          sf org list

      - name: 'Create Salesforce Project'
        run: |
          sf project generate --name "deployment-project" --manifest
          echo "Project created."

      # ───────────────────────────────────────────────────────────────────────
      # Collect Dependencies via Tooling API
      # Uses multiple query approaches to find dependencies
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Collect Dependencies via Tooling API'
        id: collect_deps
        run: |
          echo "🔍 Querying dependencies for '$COMPONENT_NAME' ($COMPONENT_TYPE)..."

          # Create an empty JSON structure
          echo '{"result":{"records":[],"totalSize":0}}' > "$PROJECT_DIR/dependencies.json"
          
          # Try different field name variations based on API version
          # Approach 1: Standard query (what our component depends on)
          sf data query \
            --target-org "$SRC_ORG_ALIAS" \
            --query "SELECT Id, MetadataComponentId, MetadataComponentName, MetadataComponentType, RefMetadataComponentId, RefMetadataComponentName, RefMetadataComponentType FROM MetadataComponentDependency WHERE MetadataComponentType = '$COMPONENT_TYPE' AND MetadataComponentName = '$COMPONENT_NAME'" \
            --use-tooling-api \
            --json > "$PROJECT_DIR/deps_query1.json" 2>/dev/null || true

          # Approach 2: Reverse query (what depends on our component - useful for tests)
          sf data query \
            --target-org "$SRC_ORG_ALIAS" \
            --query "SELECT Id, MetadataComponentId, MetadataComponentName, MetadataComponentType, RefMetadataComponentId, RefMetadataComponentName, RefMetadataComponentType FROM MetadataComponentDependency WHERE RefMetadataComponentType = '$COMPONENT_TYPE' AND RefMetadataComponentName = '$COMPONENT_NAME'" \
            --use-tooling-api \
            --json > "$PROJECT_DIR/deps_query2.json" 2>/dev/null || true

          # Parse and merge results from both queries
          if jq -e '.result.records' "$PROJECT_DIR/deps_query1.json" > /dev/null 2>&1; then
            jq -s '.[0].result.records + .[1].result.records | {result: {records: ., totalSize: length}}' \
              "$PROJECT_DIR/deps_query1.json" "$PROJECT_DIR/deps_query2.json" > "$PROJECT_DIR/dependencies.json" 2>/dev/null || true
          fi

          RECORD_COUNT=$(jq '.result.totalSize // 0' "$PROJECT_DIR/dependencies.json")
          echo "Found $RECORD_COUNT dependency records for $COMPONENT_NAME"
          echo "dep_count=$RECORD_COUNT" >> $GITHUB_OUTPUT

          echo "## Dependencies for \`$COMPONENT_NAME\`" >> $GITHUB_STEP_SUMMARY
          if [ "$RECORD_COUNT" -gt "0" ]; then
            echo "| Type | Component Name | Depends On |" >> $GITHUB_STEP_SUMMARY
            echo "|------|---------------|------------|" >> $GITHUB_STEP_SUMMARY
            jq -r '.result.records[]? | "| " + .MetadataComponentType + " | `" + .MetadataComponentName + "` | `" + .RefMetadataComponentName + "` (" + .RefMetadataComponentType + ") |"' \
              "$PROJECT_DIR/dependencies.json" >> $GITHUB_STEP_SUMMARY
          else
            echo "No dependencies found. This might mean:" >> $GITHUB_STEP_SUMMARY
            echo "- The component has no dependencies" >> $GITHUB_STEP_SUMMARY
            echo "- The Tooling API doesn't have dependency data for this component type" >> $GITHUB_STEP_SUMMARY
            echo "- The component name or type might need to be verified" >> $GITHUB_STEP_SUMMARY
          fi

      # ───────────────────────────────────────────────────────────────────────
      # Auto-discover Test Classes via Tooling API
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Auto-discover Test Classes'
        id: discover_tests
        if: env.RUN_TESTS == 'true'
        run: |
          echo "🧪 Auto-discovering test classes that reference '$COMPONENT_NAME'..."
          
          # Query for test classes that reference our component
          # Using the correct field names from MetadataComponentDependency
          TEST_QUERY="SELECT MetadataComponentName, MetadataComponentType, RefMetadataComponentName, RefMetadataComponentType 
                      FROM MetadataComponentDependency 
                      WHERE RefMetadataComponentName = '$COMPONENT_NAME' 
                      AND RefMetadataComponentType = '$COMPONENT_TYPE'
                      AND MetadataComponentType = 'ApexClass'
                      AND MetadataComponentName LIKE '%Test%'"
          
          # Also try the reverse relationship
          TEST_QUERY2="SELECT MetadataComponentName, MetadataComponentType, RefMetadataComponentName, RefMetadataComponentType 
                       FROM MetadataComponentDependency 
                       WHERE MetadataComponentName = '$COMPONENT_NAME'
                       AND MetadataComponentType = '$COMPONENT_TYPE'
                       AND RefMetadataComponentType = 'ApexClass'
                       AND RefMetadataComponentName LIKE '%Test%'"
          
          TEST_CLASSES=""
          
          # Try first query
          TEMP_TESTS=$(sf data query \
            --target-org "$SRC_ORG_ALIAS" \
            --query "$TEST_QUERY" \
            --use-tooling-api \
            --json 2>/dev/null | jq -r '.result.records[]?.MetadataComponentName // empty' || echo "")
          
          if [ -n "$TEMP_TESTS" ]; then
            TEST_CLASSES="$TEMP_TESTS"
          else
            # Try second query
            TEMP_TESTS=$(sf data query \
              --target-org "$SRC_ORG_ALIAS" \
              --query "$TEST_QUERY2" \
              --use-tooling-api \
              --json 2>/dev/null | jq -r '.result.records[]?.RefMetadataComponentName // empty' || echo "")
            if [ -n "$TEMP_TESTS" ]; then
              TEST_CLASSES="$TEMP_TESTS"
            fi
          fi
          
          # Alternative: Query ApexClass where Body contains the component name
          if [ -z "$TEST_CLASSES" ]; then
            echo "  Trying alternative test discovery via SOQL LIKE query..."
            ALT_QUERY="SELECT Id, Name FROM ApexClass WHERE Name LIKE '%Test%' AND Body LIKE '%$COMPONENT_NAME%'"
            TEST_CLASSES=$(sf data query \
              --target-org "$SRC_ORG_ALIAS" \
              --query "$ALT_QUERY" \
              --json 2>/dev/null | jq -r '.result.records[]?.Name // empty' || echo "")
          fi
          
          # Format as comma-separated string (remove duplicates and empty lines)
          DISCOVERED_TESTS=$(echo "$TEST_CLASSES" | grep -v '^$' | sort -u | tr '\n' ',' | sed 's/,$//')
          
          if [ -n "$DISCOVERED_TESTS" ]; then
            echo "discovered_test_classes=$DISCOVERED_TESTS" >> $GITHUB_OUTPUT
            echo "✅ Discovered test classes: $DISCOVERED_TESTS"
            echo "### Auto-discovered Test Classes" >> $GITHUB_STEP_SUMMARY
            echo "$DISCOVERED_TESTS" | tr ',' '\n' | sed 's/^/- `/' | sed 's/$/`/' >> $GITHUB_STEP_SUMMARY
          else
            echo "discovered_test_classes=" >> $GITHUB_OUTPUT
            echo "⚠️  No test classes found that reference '$COMPONENT_NAME'"
            echo "### Auto-discovered Test Classes" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ No test classes found that reference \`$COMPONENT_NAME\`" >> $GITHUB_STEP_SUMMARY
          fi

      # ───────────────────────────────────────────────────────────────────────
      # Build package.xml from Dependencies
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Build package.xml from Dependencies'
        run: |
          cd "$PROJECT_DIR"
          echo "📦 Building package.xml for '$COMPONENT_NAME' and its dependencies..."

          # Retrieve discovered tests from previous step
          DISCOVERED_TESTS="${{ steps.discover_tests.outputs.discovered_test_classes }}"
          MANUAL_TESTS="$TEST_CLASS_NAMES_DEPLOY"

          # Build members list per type using jq with proper escaping
          jq --arg comp_name "$COMPONENT_NAME" \
             --arg comp_type "$COMPONENT_TYPE" \
             --arg manual_tests "$MANUAL_TESTS" \
             --arg discovered_tests "$DISCOVERED_TESTS" '
            # Array of non-deployable metadata types
            def non_deployable: [
              "StandardEntity", "CustomEntity", "FieldSet", "RecordType", 
              "WebLink", "ListView", "CompactLayout", "BusinessProcess", 
              "HomePageLayout", "FlexiPage", "Report", "Dashboard"
            ];
            
            # Helper: returns true if type is deployable
            def is_deployable: . as $t | (non_deployable | index($t)) == null;
            
            # Helper to parse comma-separated string to objects
            def parse_tests: 
              if . == "" or . == null then [] 
              else split(",") | map(select(. != "" and . != null) | {type: "ApexClass", name: .}) 
              end;

            # Collect all components: main + dependencies + manual tests + discovered tests
            (
              # 1. Main component (the component being deployed)
              [{type: $comp_type, name: $comp_name}] 
              # 2. Dependencies - collect unique referenced components
              + [.result.records[]? | 
                 # Include both directions of dependencies
                 {type: .RefMetadataComponentType, name: .RefMetadataComponentName},
                 {type: .MetadataComponentType, name: .MetadataComponentName}
                 | select(.type != null and .name != null and .type != $comp_type and .name != $comp_name)]
              # 3. Manual Test classes from workflow input
              + ($manual_tests | parse_tests)
              # 4. Auto-discovered Test classes
              + ($discovered_tests | parse_tests)
            )
            # Filter: keep only deployable types with valid name/type
            | map(select(.type != null and .name != null and (.type | is_deployable)))
            # Group by type, collect unique sorted members
            | group_by(.type)
            | map({
                type: .[0].type,
                members: [.[].name] | unique | sort
              })
            | sort_by(.type)
          ' dependencies.json > /tmp/package_structure.json

          # Generate XML from jq output
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<Package xmlns="http://soap.sforce.com/2006/04/metadata">'
            
            if [ -s /tmp/package_structure.json ] && jq -e 'length > 0' /tmp/package_structure.json > /dev/null 2>&1; then
              jq -r '.[] | 
                "    <types>\n" + 
                (.members | map("        <members>\(.)</members>") | join("\n")) + "\n" +
                "        <name>\(.type)</name>\n" +
                "    </types>"' /tmp/package_structure.json
            else
              echo "⚠️  No deployable components found — generating empty package.xml" >&2
            fi
            
            echo '    <version>59.0</version>'
            echo '</Package>'
          } > manifest/package.xml

          # Log output for verification
          echo "📦 Generated package.xml:"
          cat manifest/package.xml
          
          # Summary
          TYPE_COUNT=$(jq 'length' /tmp/package_structure.json 2>/dev/null || echo "0")
          MEMBER_COUNT=$(jq '[.[].members | length] | add // 0' /tmp/package_structure.json 2>/dev/null || echo "0")
          echo "📊 Summary: $TYPE_COUNT metadata types, $MEMBER_COUNT total members"
        env:
          TEST_CLASS_NAMES_DEPLOY: ${{ github.event.inputs.TEST_CLASS_NAMES_DEPLOY }}

      # ───────────────────────────────────────────────────────────────────────
      # Dry-run check
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Dry Run Check'
        id: dry_run_check
        run: |
          if [ "$DRY_RUN" == "true" ]; then
            echo "skip_deploy=true" >> $GITHUB_OUTPUT
            echo "🧩 Dry Run mode — listing components that would be retrieved and deployed."
            echo "### Components to Deploy (dry run)" >> $GITHUB_STEP_SUMMARY
            
            if [ -f "$PROJECT_DIR/dependencies.json" ] && [ "$(jq '.result.totalSize // 0' "$PROJECT_DIR/dependencies.json")" -gt "0" ]; then
              echo "| Type | Component Name |" >> $GITHUB_STEP_SUMMARY
              echo "|------|---------------|" >> $GITHUB_STEP_SUMMARY
              jq -r '.result.records[]? | "| " + .RefMetadataComponentType + " | `" + .RefMetadataComponentName + "` |"' \
                "$PROJECT_DIR/dependencies.json" >> $GITHUB_STEP_SUMMARY
            else
              echo "No dependencies found." >> $GITHUB_STEP_SUMMARY
            fi
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⏹ Dry run complete — no metadata was retrieved or deployed." >> $GITHUB_STEP_SUMMARY
            echo "⏹ Dry run complete. No metadata was retrieved or deployed."
          else
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
            echo "Dry run not requested — proceeding with retrieval and deployment."
          fi

      # ───────────────────────────────────────────────────────────────────────
      # Retrieve Component and Dependencies
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Retrieve Component and Dependencies'
        if: steps.dry_run_check.outputs.skip_deploy != 'true'
        run: |
          cd "$PROJECT_DIR"
          echo "Retrieving metadata from '$SRC_ORG_ALIAS' using package.xml..."

          MAX_ATTEMPTS=3
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "--- Retrieve attempt $attempt of $MAX_ATTEMPTS ---"
            if sf project retrieve start \
                 --target-org "$SRC_ORG_ALIAS" \
                 --manifest manifest/package.xml \
                 --wait 30; then
              echo "✅ Retrieve succeeded on attempt $attempt."
              break
            fi
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "⚠️  Retrieve failed. Waiting 15 s before retry..."
              sleep 15
            else
              echo "❌ Retrieve failed after $MAX_ATTEMPTS attempts."
              exit 1
            fi
          done

          echo "Files retrieved:"
          find force-app -type f | sort || echo "No files found"

      # ───────────────────────────────────────────────────────────────────────
      # Deploy to Destination Org
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Deploy to Destination Org'
        if: steps.dry_run_check.outputs.skip_deploy != 'true'
        env:
          TEST_CLASS_NAMES_DEPLOY: ${{ github.event.inputs.TEST_CLASS_NAMES_DEPLOY }}
        run: |
          cd "$PROJECT_DIR"
          echo "🚀 Deploying to '$DST_ORG_ALIAS'..."

          # Build test flags - using discovered OR manual tests
          TEST_FLAGS=""
          TEST_NAMES=""
          
          if [ "$RUN_TESTS" == "true" ]; then
            # Merge discovered + manual tests, then deduplicate
            ALL_TEST_INPUTS=""
            if [ -n "${{ steps.discover_tests.outputs.discovered_test_classes }}" ]; then
              ALL_TEST_INPUTS="${{ steps.discover_tests.outputs.discovered_test_classes }}"
            fi
            if [ -n "$TEST_CLASS_NAMES_DEPLOY" ]; then
              if [ -n "$ALL_TEST_INPUTS" ]; then
                ALL_TEST_INPUTS="$ALL_TEST_INPUTS,$TEST_CLASS_NAMES_DEPLOY"
              else
                ALL_TEST_INPUTS="$TEST_CLASS_NAMES_DEPLOY"
              fi
            fi
            
            # Deduplicate and format for CLI
            if [ -n "$ALL_TEST_INPUTS" ]; then
              TEST_NAMES=$(echo "$ALL_TEST_INPUTS" | tr ',' '\n' | sort -u | grep -v '^$' | tr '\n' ',' | sed 's/,$//')
              TEST_FLAGS="--test-level RunSpecifiedTests"
              # Add each test individually to avoid command line length issues
              for test_name in $(echo "$TEST_NAMES" | tr ',' ' '); do
                TEST_FLAGS="$TEST_FLAGS --tests $test_name"
              done
              echo "🧪 Running specified tests: $TEST_NAMES"
            else
              # No tests found - use RunLocalTests as final fallback
              TEST_FLAGS="--test-level RunLocalTests"
              echo "🧪 No specific tests found - running all local tests"
            fi
          fi

          # Choose deploy vs validate subcommand
          if [ "$VALIDATE_ONLY" == "true" ]; then
            DEPLOY_CMD="validate"
            echo "🔍 Validation-only mode — no changes will be applied."
          else
            DEPLOY_CMD="deploy"
            echo "✅ Full deployment mode — changes will be applied."
          fi

          MAX_ATTEMPTS=3
          DEPLOY_EXIT=0

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "--- Deploy attempt $attempt of $MAX_ATTEMPTS ---"

            set +e
            # Use sf project deploy instead of deprecated sf project deploy start
            sf project $DEPLOY_CMD \
              --target-org "$DST_ORG_ALIAS" \
              --source-dir force-app \
              $TEST_FLAGS \
              --wait 30 \
              --json > deploy-result.json 2>&1
            DEPLOY_EXIT=$?
            set -e

            echo "📋 Deploy response (first 200 lines):"
            head -200 deploy-result.json

            if [ "$DEPLOY_EXIT" -eq 0 ]; then
              echo "✅ Deploy succeeded on attempt $attempt."
              break
            fi

            ERROR_MSG=$(jq -r '.message // ""' deploy-result.json 2>/dev/null || echo "Unknown error")
            if echo "$ERROR_MSG" | grep -qiE "timeout|ETIMEDOUT|socket|network|unavailable|connection"; then
              if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
                echo "⚠️  Transient error detected: $ERROR_MSG"
                echo "⏳ Waiting 15s before retry..."
                sleep 15
              else
                echo "❌ Deploy failed after $MAX_ATTEMPTS attempts (transient errors)."
              fi
            else
              echo "❌ Deploy failed with non-transient error — not retrying."
              echo "   Error: $ERROR_MSG"
              break
            fi
          done

          # Handle failure
          if [ "$DEPLOY_EXIT" -ne 0 ]; then
            echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Error | \`\`\`$ERROR_MSG\`\`\` |" >> $GITHUB_STEP_SUMMARY
            
            if [ -f deploy-result.json ]; then
              FAILURES=$(jq -r '.result.details.componentFailures[]? | 
                               "* `" + .componentType + "." + .fullName + "`: " + .problem' \
                        deploy-result.json 2>/dev/null || true)
              if [ -n "$FAILURES" ]; then
                echo "| Failures | $FAILURES |" >> $GITHUB_STEP_SUMMARY
              fi
            fi
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> 🔍 Check the 'Deploy to Destination Org' step logs for full details." >> $GITHUB_STEP_SUMMARY
            
            exit $DEPLOY_EXIT
          fi

          # Success summary - fixed jq escaping
          echo "## ✅ Deployment Results" >> $GITHUB_STEP_SUMMARY
          
          if [ -f deploy-result.json ]; then
            SUCCESS_COUNT=$(jq '[.result.details.componentSuccesses[]? | 
                               select(.componentType != "" and .componentType != null and .fullName != "package.xml")] | length' \
                          deploy-result.json 2>/dev/null || echo "0")
          
            if [ "$SUCCESS_COUNT" -gt "0" ]; then
              echo "### Deployed Components ($SUCCESS_COUNT)" >> $GITHUB_STEP_SUMMARY
              jq -r '.result.details.componentSuccesses[]? | 
                     select(.componentType != "" and .componentType != null and .fullName != "package.xml") |
                     "* `" + .componentType + "`: `" + .fullName + "` ✅"' \
                deploy-result.json 2>/dev/null | sort -u >> $GITHUB_STEP_SUMMARY
            else
              echo "> ℹ️  No component success details available in response." >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # Test results
          if [ "$RUN_TESTS" == "true" ] && [ -f deploy-result.json ]; then
            echo "### Test Execution" >> $GITHUB_STEP_SUMMARY
            
            TEST_SUCCESSES=$(jq -r '.result.details.runTestResult.successes[]? | 
                                   "* ✅ `" + .name + "." + .methodName + "`"' \
                            deploy-result.json 2>/dev/null || true)
            if [ -n "$TEST_SUCCESSES" ]; then
              echo "#### Passed" >> $GITHUB_STEP_SUMMARY
              echo "$TEST_SUCCESSES" >> $GITHUB_STEP_SUMMARY
            fi
            
            TEST_FAILURES=$(jq -r '.result.details.runTestResult.failures[]? | 
                                  "* ❌ `" + .name + "." + .methodName + "`: " + .message' \
                           deploy-result.json 2>/dev/null || true)
            if [ -n "$TEST_FAILURES" ]; then
              echo "#### Failed" >> $GITHUB_STEP_SUMMARY
              echo "$TEST_FAILURES" >> $GITHUB_STEP_SUMMARY
            fi
            
            COVERAGE=$(jq -r '.result.details.runTestResult.codeCoverage[]? | 
                             "* `" + .name + "`: " + (.numLinesCovered | tostring) + "/" + (.numLinesUncovered | tostring) + " covered"' \
                      deploy-result.json 2>/dev/null || true)
            if [ -n "$COVERAGE" ]; then
              echo "#### Coverage" >> $GITHUB_STEP_SUMMARY
              echo "$COVERAGE" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "### Manifest" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ package.xml processed successfully" >> $GITHUB_STEP_SUMMARY

      # ───────────────────────────────────────────────────────────────────────
      # Generate Deployment Report
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Generate Deployment Report'
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Component | \`$COMPONENT_NAME\` (\`$COMPONENT_TYPE\`) |" >> $GITHUB_STEP_SUMMARY
          echo "| Source org | \`$SRC_ORG_ALIAS\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Destination org | \`$DST_ORG_ALIAS\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | $([ "$VALIDATE_ONLY" == "true" ] && echo "Validation only" || echo "Full deploy") |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry run | $DRY_RUN |" >> $GITHUB_STEP_SUMMARY
          echo "| Apex tests | $RUN_TESTS |" >> $GITHUB_STEP_SUMMARY

          if [ "$DRY_RUN" == "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⏹ Dry run — no deployment performed." >> $GITHUB_STEP_SUMMARY
          elif [ -f "$PROJECT_DIR/deploy-result.json" ]; then
            DEPLOY_STATUS=$(jq -r '.status // 1' "$PROJECT_DIR/deploy-result.json" 2>/dev/null || echo "1")

            if [ "$DEPLOY_STATUS" != "0" ]; then
              echo "### ❌ Deployment failed" >> $GITHUB_STEP_SUMMARY
              jq -r '.message // "Unknown error"' "$PROJECT_DIR/deploy-result.json" 2>/dev/null >> $GITHUB_STEP_SUMMARY
            else
              echo "### ✅ Successes" >> $GITHUB_STEP_SUMMARY
              jq -r '.result.details.componentSuccesses[]?
                     | select(.componentType != "" and .fullName != "package.xml") |
                     "* `" + .componentType + "`: `" + .fullName + "` ✅"' \
                "$PROJECT_DIR/deploy-result.json" 2>/dev/null >> $GITHUB_STEP_SUMMARY \
                || echo "No success details available." >> $GITHUB_STEP_SUMMARY

              if [ "$RUN_TESTS" == "true" ]; then
                echo "### Test results" >> $GITHUB_STEP_SUMMARY
                jq -r '.result.details.runTestResult.successes[]?
                       | "* ✅ `" + .name + "." + .methodName + "`"' \
                  "$PROJECT_DIR/deploy-result.json" 2>/dev/null >> $GITHUB_STEP_SUMMARY \
                  || echo "No test results." >> $GITHUB_STEP_SUMMARY
              fi

              echo "### Failures (if any)" >> $GITHUB_STEP_SUMMARY
              jq -r '.result.details.componentFailures[]?
                     | "* `" + .componentType + "`: `" + .fullName + "` ❌ — " + .problem' \
                "$PROJECT_DIR/deploy-result.json" 2>/dev/null >> $GITHUB_STEP_SUMMARY \
                || echo "No component failures." >> $GITHUB_STEP_SUMMARY

              if [ "$RUN_TESTS" == "true" ]; then
                jq -r '.result.details.runTestResult.failures[]?
                       | "* ❌ `" + .name + "." + .methodName + "` — " + .message' \
                  "$PROJECT_DIR/deploy-result.json" 2>/dev/null >> $GITHUB_STEP_SUMMARY \
                  || echo "No test failures." >> $GITHUB_STEP_SUMMARY
              fi
            fi
          else
            echo "⚠️  deploy-result.json not found — deployment step may have been skipped." \
              >> $GITHUB_STEP_SUMMARY
          fi

      # ───────────────────────────────────────────────────────────────────────
      # Upload Artifacts
      # ───────────────────────────────────────────────────────────────────────
      - name: 'Upload Artifacts'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifacts
          path: |
            ${{ env.PROJECT_DIR }}/dependencies.json
            ${{ env.PROJECT_DIR }}/deploy-result.json
            ${{ env.PROJECT_DIR }}/manifest/package.xml
          if-no-files-found: warn
